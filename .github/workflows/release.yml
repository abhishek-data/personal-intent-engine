name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-14, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      # Import the self-signed code-signing certificate into a temporary keychain
      # so the macOS app is signed with a STABLE identity ("PIE Developers")
      # instead of ad-hoc. A stable signing identity is what lets macOS TCC keep
      # the Accessibility/Microphone grants across app updates — ad-hoc builds
      # change identity every version and force the user to re-grant every time.
      # This is self-signed (not an Apple Developer ID), so it does NOT notarize;
      # Gatekeeper still shows the "unverified" prompt on first download (handled
      # by the install script's xattr strip or "Open Anyway").
      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-14'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/pie-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/pie-cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Prepend our keychain to the user search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[" ]//g')
          rm -f "$CERT_PATH"
          echo "Signing identities available:"
          security find-identity -v "$KEYCHAIN" || true

      # tauri-action installs the Tauri CLI, builds the frontend + app, bundles
      # the .dmg / .exe, and uploads them to a GitHub release. On macOS,
      # APPLE_SIGNING_IDENTITY overrides tauri.conf.json's signingIdentity ("-")
      # so the build signs with the imported "PIE Developers" cert. On Windows
      # the variable is ignored. Notarization env (APPLE_ID/APPLE_PASSWORD) is
      # intentionally unset — this is a self-signed, non-notarized distribution.
      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: PIE Developers
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PIE ${{ github.ref_name }}'
          # The macOS app is ad-hoc signed (no Apple Developer ID), so Gatekeeper
          # blocks it on first launch. The one-line install script handles the
          # xattr -cr quarantine strip automatically; manual DMG users must run it.
          releaseBody: |
            ## Install

            ### macOS (Apple Silicon) — one line

            ```bash
            curl -fsSL https://raw.githubusercontent.com/abhishek-data/personal-intent-engine/main/scripts/install.sh | bash
            ```

            Downloads the DMG, installs PIE to /Applications, and strips the Gatekeeper quarantine attribute so it opens without any prompts.

            ### Homebrew

            ```bash
            brew tap abhishek-data/pie https://github.com/abhishek-data/homebrew-pie
            brew install --cask abhishek-data/pie/pie
            xattr -cr /Applications/PIE.app
            ```

            ### Manual DMG

            Download the `.dmg` below, drag PIE to Applications, then run:

            ```bash
            xattr -cr /Applications/PIE.app
            ```

            (Or right-click PIE → Open the first time and confirm at the Gatekeeper prompt.)

            ### Windows

            Run the `.exe` installer below. If SmartScreen warns, click **More info → Run anyway**.

            ---

            Builds are unsigned (ad-hoc only). On first run, grant **Microphone** and **Accessibility** permission (Accessibility is needed to paste the prompt at your cursor).
          releaseDraft: true
          prerelease: true
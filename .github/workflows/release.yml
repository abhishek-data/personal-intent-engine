name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-14, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      # tauri-action installs the Tauri CLI, builds the frontend + app, bundles
      # the .dmg / .exe, and uploads them to a GitHub release. The macOS app is
      # ad-hoc signed during the build (bundle.macOS.signingIdentity = "-" in
      # tauri.conf.json) so Gatekeeper shows "unidentified developer" (openable
      # via right-click → Open, or skipped by the install script's xattr strip)
      # instead of "damaged" (which blocks entirely).
      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PIE ${{ github.ref_name }}'
          # The macOS app is ad-hoc signed (no Apple Developer ID), so Gatekeeper
          # blocks it on first launch. The one-line install script handles the
          # xattr -cr quarantine strip automatically; manual DMG users must run it.
          releaseBody: |
            ## Install

            ### macOS (Apple Silicon) — one line

            ```bash
            curl -fsSL https://raw.githubusercontent.com/abhishek-data/personal-intent-engine/main/scripts/install.sh | bash
            ```

            Downloads the DMG, installs PIE to /Applications, and strips the Gatekeeper quarantine attribute so it opens without any prompts.

            ### Homebrew

            ```bash
            brew tap abhishek-data/pie https://github.com/abhishek-data/homebrew-pie
            brew install --cask abhishek-data/pie/pie
            xattr -cr /Applications/PIE.app
            ```

            ### Manual DMG

            Download the `.dmg` below, drag PIE to Applications, then run:

            ```bash
            xattr -cr /Applications/PIE.app
            ```

            (Or right-click PIE → Open the first time and confirm at the Gatekeeper prompt.)

            ### Windows

            Run the `.exe` installer below. If SmartScreen warns, click **More info → Run anyway**.

            ---

            Builds are unsigned (ad-hoc only). On first run, grant **Microphone** and **Accessibility** permission (Accessibility is needed to paste the prompt at your cursor).
          releaseDraft: true
          prerelease: true
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-14, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Build Tauri app
        run: cargo tauri build

      # Ad-hoc sign the macOS .app so Gatekeeper shows "unidentified developer"
      # (which gives an "Open Anyway" button) instead of "damaged" (which blocks).
      - name: Ad-hoc sign macOS app
        if: runner.os == 'macOS'
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/PIE.app"
          if [ -d "$APP_PATH" ]; then
            codesign --force --deep --sign - "$APP_PATH"
            echo "Ad-hoc signed $APP_PATH"
          fi

      - name: Collect release artifacts
        run: |
          mkdir -p artifacts
          if [ "$RUNNER_OS" == "macOS" ]; then
            # Create DMG from the signed .app
            APP_PATH="src-tauri/target/release/bundle/macos/PIE.app"
            DMG_PATH="artifacts/PIE.dmg"
            hdiutil create -volname "PIE" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"
            # Also copy the .app
            cp -R "$APP_PATH" artifacts/
          elif [ "$RUNNER_OS" == "Windows" ]; then
            cp src-tauri/target/release/bundle/msi/*.msi artifacts/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/nsis/*.exe artifacts/ 2>/dev/null || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'PIE ${{ github.ref_name }}'
          body: 'Download the installer for your platform below.\n\n**macOS:** Open the .dmg and drag PIE to Applications. Right-click → Open the first time.\n\n**Windows:** Run the .exe installer. Click "More info → Run anyway" if SmartScreen warns.'
          draft: true
          prerelease: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

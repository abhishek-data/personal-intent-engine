name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-14, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      # tauri-action installs the Tauri CLI, builds the frontend + app, bundles
      # the .dmg / .exe, and uploads them to a GitHub release. The macOS app is
      # ad-hoc signed during the build (bundle.macOS.signingIdentity = "-" in
      # tauri.conf.json) so Gatekeeper shows "unidentified developer" (openable
      # via right-click → Open) instead of "damaged" (which blocks entirely).
      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PIE ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below. Builds are unsigned (ad-hoc only) — macOS: right-click the app and choose Open the first time. Windows: click "More info → Run anyway" if SmartScreen warns.'
          releaseDraft: true
          prerelease: true
